<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>⛽ PetrolPump</h1>
            <p>Dispensing Log System</p>
        </div>

        <div class="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" [(ngModel)]="username" placeholder="Enter username" class="form-control" />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" [(ngModel)]="password" placeholder="Enter password" class="form-control" />
            </div>

            <div class="error-message" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <button class="login-btn" (click)="onLogin()" [disabled]="isLoading">
                {{ isLoading ? 'Logging in...' : 'Login' }}
            </button>
        </div>
    </div>
</div>
